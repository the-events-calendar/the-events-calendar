name: 'PHPCS'
on: [pull_request]
jobs:
  check:
    if: "!contains(github.event.pull_request.body, '[skip-phpcs]')"
    runs-on: ubuntu-latest
    outputs:
      run_tests: ${{ steps.php_check.outputs.php_files_changed }}
    steps:
      # ------------------------------------------------------------------------------
      # Checkout the repo
      # ------------------------------------------------------------------------------
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1000
          token: ${{ secrets.GHA_BOT_TOKEN_MANAGER }}
          submodules: recursive
      # ------------------------------------------------------------------------------
      # Check if any PHP files have changed
      # ------------------------------------------------------------------------------
      - name: Check for PHP file changes
        id: php_check
        uses: ./.github/actions/check-php-changes
  phpcs:
    needs: check
    if: needs.check.outputs.run_tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # ------------------------------------------------------------------------------
      # Checkout the repo
      # ------------------------------------------------------------------------------
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1000
          token: ${{ secrets.GH_BOT_TOKEN }}
          submodules: recursive

      # ------------------------------------------------------------------------------
      # Set up PHP and Composer dependencies
      # ------------------------------------------------------------------------------
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: uopz
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Set up reviewdog
        uses: reviewdog/action-setup@v1

      # ------------------------------------------------------------------------------
      # Run PHPCS with robust JSON parsing
      # ------------------------------------------------------------------------------
      - name: Run PHPCS and annotate PR
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail

          vendor/bin/phpcs --report=checkstyle -q | reviewdog \
            -f=checkstyle \
            -name=phpcs \
            -filter-mode=added \
            -fail-level=any \
            -reporter=github-pr-check
